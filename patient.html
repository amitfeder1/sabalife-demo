<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SabaLife - Patient App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background-color: #f3f4f6; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #d1d5db; border-radius: 4px; }
        input[type=range]:focus { outline: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- This app is bound to exactly one patient — the person who owns this physical device.
         There is no login, no picker, no switching between people: just like a real wearable,
         one SabaShirt = one patient. To hand this file to a different patient, change the two
         constants marked "DEVICE IDENTITY" near the top of the script below. -->
    <div id="app-view" class="w-full max-w-2xl bg-white p-8 rounded-2xl shadow-2xl border-t-8 border-gray-800">

        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">👤 <span id="app-user-name">--</span></h1>
                <p class="text-gray-500 text-sm font-bold" id="app-inst-name">--</p>
            </div>
            <button onclick="window.location.href='caregiver.html'" class="bg-blue-100 text-blue-700 px-3 py-2 rounded font-bold hover:bg-blue-200 transition text-sm">Caregiver Dashboard</button>
        </div>

        <button onclick="forceAlertNow()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold text-xl py-4 rounded-xl shadow-lg transition mb-4">
            🚨 Force Alert Now
        </button>
        <p class="text-center text-gray-400 text-xs mb-6 -mt-2">Instantly reports dangerous vitals to the caregiver (for demo purposes)</p>

        <div class="mb-6 bg-gray-50 p-4 rounded-xl border border-gray-200">
            <label class="block text-gray-700 font-bold mb-2">🎯 Or gradually simulate a target reading:</label>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-2">
                <label class="cursor-pointer">
                    <input type="radio" name="sim-status" value="normal" class="peer sr-only" checked>
                    <div class="text-center p-3 rounded-lg border-2 border-transparent peer-checked:border-green-500 peer-checked:bg-green-100 bg-white font-bold text-green-600 transition">✅ Normal</div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="sim-status" value="warning" class="peer sr-only">
                    <div class="text-center p-3 rounded-lg border-2 border-transparent peer-checked:border-orange-500 peer-checked:bg-orange-100 bg-white font-bold text-orange-600 transition">⚠️ Warning</div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="sim-status" value="danger" class="peer sr-only">
                    <div class="text-center p-3 rounded-lg border-2 border-transparent peer-checked:border-red-500 peer-checked:bg-red-100 bg-white font-bold text-red-600 transition">🚨 Danger</div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="sim-status" value="disconnect" class="peer sr-only">
                    <div class="text-center p-3 rounded-lg border-2 border-transparent peer-checked:border-gray-500 peer-checked:bg-gray-200 bg-white font-bold text-gray-600 transition">🔌 Disconnected</div>
                </label>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <div class="space-y-6 bg-blue-50 p-4 rounded-xl border border-blue-100">
                <h2 class="font-bold text-blue-800 border-b border-blue-200 pb-2">Target Vitals</h2>
                <div>
                    <div class="flex justify-between mb-1">
                        <label class="font-bold text-gray-700">❤️ Heart Rate</label>
                        <span id="hr-display" class="font-bold text-blue-600">75 BPM</span>
                    </div>
                    <input type="range" id="sim-hr" min="40" max="180" value="75" oninput="document.getElementById('hr-display').innerText = this.value + ' BPM'">
                </div>
                <div>
                    <div class="flex justify-between mb-1">
                        <label class="font-bold text-gray-700">💧 Hydration</label>
                        <span id="hyd-display" class="font-bold text-blue-600">98%</span>
                    </div>
                    <input type="range" id="sim-hyd" min="30" max="100" value="98" oninput="document.getElementById('hyd-display').innerText = this.value + '%'">
                </div>
            </div>

            <div class="space-y-6 bg-gray-50 p-4 rounded-xl border border-gray-200">
                <h2 class="font-bold text-gray-800 border-b border-gray-200 pb-2">SabaShirt Status</h2>
                <div>
                    <div class="flex justify-between mb-1">
                        <label class="block text-gray-700 font-bold mb-2">🔋 Battery Level</label>
                        <span id="bat-display" class="font-bold text-green-600">100%</span>
                    </div>
                    <input type="range" id="sim-battery" min="0" max="100" value="100" oninput="updateBatteryDisplay(this.value)">
                </div>
                <div>
                    <div class="flex justify-between mb-1">
                        <label class="block text-gray-700 font-bold mb-2">👕 Shirt Health</label>
                        <span id="wash-display" class="font-bold text-green-600">100%</span>
                    </div>
                    <input type="range" id="sim-washes" min="0" max="100" value="100" oninput="updateWashesDisplay(this.value)">
                </div>
            </div>
        </div>

        <button onclick="sendDataGradually()" id="submit-btn" class="w-full bg-gray-800 hover:bg-black text-white font-bold text-xl py-4 rounded-xl shadow-lg transition">
            ⏳ Start Gradual Simulation (10 sec)
        </button>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        firebase.initializeApp({ databaseURL: "https://sabalife-d85e6-default-rtdb.europe-west1.firebasedatabase.app" });
        const db = firebase.database();

        const institutionsData = {
            'rishonim': { name: 'Sunrise Manor', patients: [
                { id: 'rishon_1', name: 'Chaim Cohen' }, { id: 'rishon_2', name: 'Sarah Levi' }, { id: 'rishon_3', name: 'Jacob Avrahami' }
            ]},
            'ramat': { name: 'Ramat Aviv Care Center', patients: [
                { id: 'ramat_1', name: 'David Sasson' }, { id: 'ramat_2', name: 'Leah Golan' }, { id: 'ramat_3', name: 'Moshe Dayan' }
            ]},
            'kfar': { name: 'Village Elder Home', patients: [
                { id: 'kfar_1', name: 'Rebecca Friedman' }, { id: 'kfar_2', name: 'Amit Feder' }, { id: 'kfar_3', name: 'Guy Siegel' }
            ]}
        };

        // ===== DEVICE IDENTITY =====
        // This one SabaShirt device belongs to exactly one patient. To configure this file
        // for a different person, change these two lines to their clinic + patient id
        // (see institutionsData above for available ids) — nothing else needs to change.
        const CURRENT_INSTITUTION = 'kfar';
        const CURRENT_PATIENT_ID = 'kfar_1'; // Rebecca Friedman
        // ============================

        let currentInstitution = CURRENT_INSTITUTION;
        let currentPatientId = CURRENT_PATIENT_ID;
        let liveDbData = {};

        db.ref('sabalife').on('value', (snapshot) => {
            if (snapshot.exists()) liveDbData = snapshot.val();
        });

        (function enterApp() {
            const pInfo = institutionsData[currentInstitution].patients.find(p => p.id === currentPatientId);
            document.getElementById('app-user-name').innerText = pInfo.name;
            document.getElementById('app-inst-name').innerText = institutionsData[currentInstitution].name;

            // Tell the caregiver dashboard which single patient this device belongs to,
            // so it can focus on just this person during the demo instead of the full clinic roster.
            db.ref('sabalife_meta/active').set({ inst: currentInstitution, id: currentPatientId, name: pInfo.name, ts: Date.now() });
        })();

        window.updateBatteryDisplay = function(val) {
            const display = document.getElementById('bat-display'); display.innerText = val + '%';
            display.className = val <= 20 ? 'font-bold text-red-600' : 'font-bold text-green-600';
        }

        window.updateWashesDisplay = function(val) {
            const display = document.getElementById('wash-display'); display.innerText = val + '%';
            display.className = val <= 20 ? 'font-bold text-red-600' : 'font-bold text-green-600';
        }

        function getStatusFromValues(hr, hyd) {
            if (hr > 140 || hr < 50 || hyd < 75) {
                return { status: 'danger', message: '🚨 Danger: Distress detected! Vitals outside safe range' };
            } else if (hr > 100 || hr < 60 || hyd < 90) {
                return { status: 'warning', message: '⚠️ Warning: Vitals outside normal range' };
            } else {
                return { status: 'normal', message: 'Vitals normal' };
            }
        }

        // Guarantees an alert reaches the caregiver within seconds, as required by the demo's acceptance criteria
        window.forceAlertNow = function() {
            if (!currentPatientId) return;
            db.ref('sabalife/' + currentPatientId).update({
                heartRate: 162,
                hydration: 64,
                battery: parseInt(document.getElementById('sim-battery').value),
                washes: parseInt(document.getElementById('sim-washes').value),
                status: 'danger',
                message: '🚨 Danger: Distress detected! Vitals outside safe range (forced alert)',
                acknowledged: false
            });
        };

        window.sendDataGradually = function() {
            const btn = document.getElementById('submit-btn');
            if (btn.disabled || !currentPatientId) return;
            btn.disabled = true;

            const targetHr = parseInt(document.getElementById('sim-hr').value);
            const targetHyd = parseInt(document.getElementById('sim-hyd').value);
            const targetBattery = parseInt(document.getElementById('sim-battery').value);
            const targetWashes = parseInt(document.getElementById('sim-washes').value);
            const selectedRadio = document.querySelector('input[name="sim-status"]:checked').value;

            const currentData = liveDbData[currentPatientId] || {};
            let startHr = parseInt(currentData.heartRate) || 75;
            let startHyd = parseInt(currentData.hydration) || 98;

            if (isNaN(startHr)) startHr = 75;
            if (isNaN(startHyd)) startHyd = 98;

            const patientRef = db.ref('sabalife/' + currentPatientId);

            if (selectedRadio === 'disconnect') {
                btn.innerHTML = "Running simulation...";
                btn.classList.replace('bg-gray-800', 'bg-blue-600');
                patientRef.update({
                    heartRate: '--',
                    hydration: '--',
                    battery: targetBattery,
                    washes: targetWashes,
                    status: 'disconnect',
                    message: 'Shirt disconnected',
                    acknowledged: false
                }).then(() => {
                    btn.innerHTML = "✅ Done!";
                    btn.classList.replace('bg-blue-600', 'bg-green-600');
                    setTimeout(() => {
                        btn.innerHTML = "⏳ Start Gradual Simulation (10 sec)";
                        btn.classList.replace('bg-green-600', 'bg-gray-800');
                        btn.disabled = false;
                    }, 2000);
                });
                return;
            }

            const totalSteps = 10;
            let currentStep = 1;

            btn.classList.replace('bg-gray-800', 'bg-blue-600');
            btn.innerHTML = "Running simulation...";

            let interval;
            const runStep = () => {
                let stepHr = Math.round(startHr + ((targetHr - startHr) * (currentStep / totalSteps)));
                let stepHyd = Math.round(startHyd + ((targetHyd - startHyd) * (currentStep / totalSteps)));

                let evalResult = getStatusFromValues(stepHr, stepHyd);

                if (currentStep >= totalSteps) {
                    clearInterval(interval);
                    let finalEval = getStatusFromValues(targetHr, targetHyd);
                    patientRef.update({
                        heartRate: targetHr,
                        hydration: targetHyd,
                        battery: targetBattery,
                        washes: targetWashes,
                        status: finalEval.status,
                        message: finalEval.message,
                        acknowledged: false
                    }).then(() => {
                        btn.innerHTML = "✅ Done!";
                        btn.classList.replace('bg-blue-600', 'bg-green-600');
                        setTimeout(() => {
                            btn.innerHTML = "⏳ Start Gradual Simulation (10 sec)";
                            btn.classList.replace('bg-green-600', 'bg-gray-800');
                            btn.disabled = false;
                        }, 2000);
                    });
                } else {
                    patientRef.update({
                        heartRate: stepHr,
                        hydration: stepHyd,
                        status: evalResult.status,
                        message: `${evalResult.message} (${currentStep}/10)`,
                        acknowledged: false
                    });
                }
            };

            runStep();

            interval = setInterval(() => {
                currentStep++;
                runStep();
            }, 1000);
        }

        document.querySelectorAll('input[name="sim-status"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const hrSlider = document.getElementById('sim-hr');
                const hydSlider = document.getElementById('sim-hyd');

                switch(e.target.value) {
                    case 'normal':
                        hrSlider.value = 75;
                        hydSlider.value = 98;
                        break;
                    case 'warning':
                        hrSlider.value = 115;
                        hydSlider.value = 88;
                        break;
                    case 'danger':
                        hrSlider.value = 155;
                        hydSlider.value = 70;
                        break;
                }

                if (e.target.value !== 'disconnect') {
                    document.getElementById('hr-display').innerText = hrSlider.value + ' BPM';
                    document.getElementById('hyd-display').innerText = hydSlider.value + '%';
                }

                // Pressing any state (Normal/Warning/Danger/Disconnected) should start moving the
                // vitals toward it right away, without a separate "Start Simulation" click - but
                // gradually, so the caregiver dashboard sees it change slowly and realistically
                // instead of jumping instantly. Use "🚨 Force Alert Now" above for an instant alert.
                sendDataGradually();
            });
        });
    </script>
</body>
</html>
